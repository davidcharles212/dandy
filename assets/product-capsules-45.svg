  </g>
  <text x="300" y="410" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="26" font-weight="700" fill="#24312a">45mg</text>
  <text x="300" y="434" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="13" fill="#55635b">mitragynine per capsule</text>
  <text x="300" y="540" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="14" letter-spacing="2" fill="#8b988f">5 &#183; 10 COUNT</text>

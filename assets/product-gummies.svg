<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Dandy Mixed Berry Kratom Gummies pouch with gummies">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4efe4"/>
      <stop offset="1" stop-color="#e9e2d0"/>
    </linearGradient>
    <linearGradient id="pouch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#236b51"/>
      <stop offset="0.55" stop-color="#1a5340"/>
      <stop offset="1" stop-color="#123c2d"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="gumshine" cx="0.35" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bg)"/>
  <circle cx="470" cy="130" r="150" fill="#e3dcc7" opacity="0.6"/>
  <ellipse cx="290" cy="522" rx="200" ry="26" fill="#3a3325" opacity="0.16"/>

  <!-- pouch -->
  <path d="M175 132 L405 132 L428 196 L430 476 Q430 512 394 512 L186 512 Q150 512 150 476 L152 196 Z" fill="url(#pouch)"/>
  <path d="M175 132 L405 132 L428 196 L430 476 Q430 512 394 512 L186 512 Q150 512 150 476 L152 196 Z" fill="url(#sheen)"/>
  <!-- top crimp -->
  <rect x="171" y="140" width="238" height="18" rx="4" fill="#0e2f23"/>
  <g stroke="#2c6d54" stroke-width="2" opacity="0.8">
    <line x1="180" y1="144" x2="180" y2="154"/><line x1="196" y1="144" x2="196" y2="154"/><line x1="212" y1="144" x2="212" y2="154"/><line x1="228" y1="144" x2="228" y2="154"/><line x1="244" y1="144" x2="244" y2="154"/><line x1="260" y1="144" x2="260" y2="154"/><line x1="276" y1="144" x2="276" y2="154"/><line x1="292" y1="144" x2="292" y2="154"/><line x1="308" y1="144" x2="308" y2="154"/><line x1="324" y1="144" x2="324" y2="154"/><line x1="340" y1="144" x2="340" y2="154"/><line x1="356" y1="144" x2="356" y2="154"/><line x1="372" y1="144" x2="372" y2="154"/><line x1="388" y1="144" x2="388" y2="154"/><line x1="400" y1="144" x2="400" y2="154"/>
  </g>

  <!-- label -->
  <rect x="188" y="208" width="204" height="252" rx="14" fill="#faf6ec"/>
  <rect x="188" y="208" width="204" height="252" rx="14" fill="none" stroke="#e2d9c2" stroke-width="2"/>
  <text x="290" y="258" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#14432f">Dandy</text>
  <text x="290" y="284" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" letter-spacing="3.5" fill="#7a7360">KRATOM GUMMIES</text>
  <line x1="216" y1="298" x2="364" y2="298" stroke="#e2d9c2" stroke-width="2"/>
  <!-- berries -->
  <g>
    <circle cx="258" cy="336" r="19" fill="#8a4a72"/><circle cx="258" cy="336" r="19" fill="url(#gumshine)"/>
    <circle cx="292" cy="326" r="21" fill="#b0566c"/><circle cx="292" cy="326" r="21" fill="url(#gumshine)"/>
    <circle cx="326" cy="338" r="18" fill="#5f4a86"/><circle cx="326" cy="338" r="18" fill="url(#gumshine)"/>
    <path d="M288 304 q4 -12 14 -14 q-2 12 -14 14" fill="#2e7a5d"/>
  </g>
  <text x="290" y="392" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="19" font-weight="700" fill="#24312a">Mixed Berry</text>
  <text x="290" y="414" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12.5" fill="#6a6352">35mg mitragynine per gummy</text>
  <rect x="238" y="430" width="104" height="18" rx="9" fill="#14432f"/>
  <text x="290" y="443" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10.5" font-weight="700" letter-spacing="1.5" fill="#faf6ec">LAB TESTED</text>

  <!-- gummies in front -->
  <g>
    <ellipse cx="463" cy="507" rx="34" ry="10" fill="#3a3325" opacity="0.12"/>
    <circle cx="452" cy="486" r="24" fill="#b0566c"/><circle cx="452" cy="486" r="24" fill="url(#gumshine)"/>
    <circle cx="487" cy="500" r="20" fill="#8a4a72"/><circle cx="487" cy="500" r="20" fill="url(#gumshine)"/>
    <circle cx="123" cy="500" r="21" fill="#5f4a86"/><circle cx="123" cy="500" r="21" fill="url(#gumshine)"/>
    <ellipse cx="125" cy="519" rx="26" ry="8" fill="#3a3325" opacity="0.12"/>
  </g>
</svg>

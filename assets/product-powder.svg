<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Dandy Kratom Leaf Powder kraft pouch with scoop of powder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4efe4"/>
      <stop offset="1" stop-color="#e9e2d0"/>
    </linearGradient>
    <linearGradient id="kraft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cfa878"/>
      <stop offset="0.55" stop-color="#bd9260"/>
      <stop offset="1" stop-color="#a67c4c"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bg)"/>
  <circle cx="130" cy="140" r="140" fill="#e3dcc7" opacity="0.6"/>
  <ellipse cx="300" cy="524" rx="210" ry="26" fill="#3a3325" opacity="0.16"/>

  <!-- pouch -->
  <path d="M180 128 L420 128 L444 194 L446 478 Q446 514 410 514 L190 514 Q154 514 154 478 L156 194 Z" fill="url(#kraft)"/>
  <path d="M180 128 L420 128 L444 194 L446 478 Q446 514 410 514 L190 514 Q154 514 154 478 L156 194 Z" fill="url(#sheen)"/>
  <rect x="176" y="136" width="248" height="18" rx="4" fill="#8a6238"/>
  <g stroke="#d7b482" stroke-width="2" opacity="0.85">
    <line x1="186" y1="140" x2="186" y2="150"/><line x1="204" y1="140" x2="204" y2="150"/><line x1="222" y1="140" x2="222" y2="150"/><line x1="240" y1="140" x2="240" y2="150"/><line x1="258" y1="140" x2="258" y2="150"/><line x1="276" y1="140" x2="276" y2="150"/><line x1="294" y1="140" x2="294" y2="150"/><line x1="312" y1="140" x2="312" y2="150"/><line x1="330" y1="140" x2="330" y2="150"/><line x1="348" y1="140" x2="348" y2="150"/><line x1="366" y1="140" x2="366" y2="150"/><line x1="384" y1="140" x2="384" y2="150"/><line x1="402" y1="140" x2="402" y2="150"/><line x1="414" y1="140" x2="414" y2="150"/>
  </g>

  <!-- label -->
  <rect x="192" y="206" width="216" height="256" rx="14" fill="#faf6ec"/>
  <rect x="192" y="206" width="216" height="256" rx="14" fill="none" stroke="#e2d9c2" stroke-width="2"/>
  <text x="300" y="256" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#14432f">Dandy</text>
  <text x="300" y="282" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" letter-spacing="3" fill="#7a7360">KRATOM LEAF POWDER</text>
  <line x1="222" y1="296" x2="378" y2="296" stroke="#e2d9c2" stroke-width="2"/>
  <!-- leaf emblem -->
  <g>
    <circle cx="300" cy="342" r="34" fill="#eaf2ee"/>
    <path d="M300 316 C 272 330 267 360 300 372 C 333 360 328 330 300 316 Z" fill="#1e5c45"/>
    <path d="M300 320 L300 368" stroke="#eaf2ee" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M300 334 L288 328 M300 344 L290 340 M300 334 L312 328 M300 344 L310 340 M300 354 L291 351 M300 354 L309 351" stroke="#eaf2ee" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="300" y="404" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#24312a">Single-Origin · Finely Ground</text>
  <text x="300" y="424" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12.5" fill="#6a6352">Mitragyna speciosa · Raw leaf</text>
  <rect x="248" y="436" width="104" height="18" rx="9" fill="#14432f"/>
  <text x="300" y="449" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10.5" font-weight="700" letter-spacing="1.5" fill="#faf6ec">LAB TESTED</text>

  <!-- powder mound + scoop -->
  <g>
    <ellipse cx="493" cy="512" rx="52" ry="12" fill="#3a3325" opacity="0.12"/>
    <path d="M448 510 Q493 470 538 510 Z" fill="#4c7a45"/>
    <path d="M456 510 Q493 478 530 510 Z" fill="#5c8c52"/>
    <ellipse cx="108" cy="514" rx="40" ry="9" fill="#3a3325" opacity="0.12"/>
    <path d="M76 512 Q108 484 140 512 Z" fill="#5c8c52"/>
    <!-- scoop -->
    <path d="M96 470 q14 -8 24 2 q8 10 -2 20 q-12 10 -24 -2 q-8 -12 2 -20 Z" fill="#d8b98c"/>
    <rect x="118" y="452" width="34" height="9" rx="4.5" fill="#c9a876" transform="rotate(28 118 452)"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" role="img" aria-label="Dandy kratom gummies pouch and leaf powder pouch styled with gummies and botanical leaves">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2ecdd"/>
      <stop offset="1" stop-color="#e6ddc6"/>
    </linearGradient>
    <linearGradient id="hpouch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#236b51"/>
      <stop offset="0.55" stop-color="#1a5340"/>
      <stop offset="1" stop-color="#123c2d"/>
    </linearGradient>
    <linearGradient id="hkraft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cfa878"/>
      <stop offset="1" stop-color="#a67c4c"/>
    </linearGradient>
    <linearGradient id="hsheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="hshine" cx="0.35" cy="0.28" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="760" rx="24" fill="url(#hbg)"/>
  <circle cx="700" cy="150" r="190" fill="#e0d7bd" opacity="0.7"/>
  <circle cx="150" cy="600" r="150" fill="#e0d7bd" opacity="0.5"/>

  <!-- big leaves behind -->
  <path d="M715 350 C 640 400 630 495 725 520 C 812 488 795 392 715 350 Z" fill="#2e7a5d" opacity="0.35"/>
  <path d="M180 220 C 120 260 115 335 190 355 C 258 330 245 254 180 220 Z" fill="#2e7a5d" opacity="0.3"/>

  <ellipse cx="450" cy="652" rx="330" ry="36" fill="#3a3325" opacity="0.16"/>

  <!-- powder pouch (behind, right) -->
  <g transform="translate(60 30) rotate(3 520 420)">
    <path d="M470 180 L680 180 L700 238 L702 606 Q702 640 668 640 L476 640 Q442 640 442 606 L444 238 Z" fill="url(#hkraft)"/>
    <path d="M470 180 L680 180 L700 238 L702 606 Q702 640 668 640 L476 640 Q442 640 442 606 L444 238 Z" fill="url(#hsheen)"/>
    <rect x="466" y="188" width="218" height="16" rx="4" fill="#8a6238"/>
    <rect x="482" y="252" width="182" height="220" rx="12" fill="#faf6ec"/>
    <text x="573" y="298" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#14432f">Dandy</text>
    <text x="573" y="321" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10.5" letter-spacing="2.5" fill="#7a7360">KRATOM LEAF POWDER</text>
    <circle cx="573" cy="374" r="28" fill="#eaf2ee"/>
    <path d="M573 352 C 550 364 546 388 573 398 C 600 388 596 364 573 352 Z" fill="#1e5c45"/>
    <path d="M573 356 L573 394" stroke="#eaf2ee" stroke-width="3" stroke-linecap="round"/>
    <text x="573" y="430" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12.5" font-weight="700" fill="#24312a">Single-Origin</text>
    <text x="573" y="448" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10.5" fill="#6a6352">Finely ground raw leaf</text>
  </g>

  <!-- gummies pouch (front, left) -->
  <g transform="translate(-20 0) rotate(-3 300 430)">
    <path d="M190 200 L420 200 L443 264 L445 620 Q445 656 409 656 L201 656 Q165 656 165 620 L167 264 Z" fill="url(#hpouch)"/>
    <path d="M190 200 L420 200 L443 264 L445 620 Q445 656 409 656 L201 656 Q165 656 165 620 L167 264 Z" fill="url(#hsheen)"/>
    <rect x="186" y="208" width="238" height="17" rx="4" fill="#0e2f23"/>
    <rect x="203" y="278" width="204" height="248" rx="14" fill="#faf6ec"/>
    <text x="305" y="330" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#14432f">Dandy</text>
    <text x="305" y="356" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11.5" letter-spacing="3" fill="#7a7360">KRATOM GUMMIES</text>
    <g>
      <circle cx="273" cy="408" r="19" fill="#8a4a72"/><circle cx="273" cy="408" r="19" fill="url(#hshine)"/>
      <circle cx="307" cy="398" r="21" fill="#b0566c"/><circle cx="307" cy="398" r="21" fill="url(#hshine)"/>
      <circle cx="341" cy="410" r="18" fill="#5f4a86"/><circle cx="341" cy="410" r="18" fill="url(#hshine)"/>
    </g>
    <text x="305" y="462" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#24312a">Mixed Berry</text>
    <text x="305" y="484" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#6a6352">35mg mitragynine per gummy</text>
    <rect x="253" y="498" width="104" height="18" rx="9" fill="#14432f"/>
    <text x="305" y="511" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10.5" font-weight="700" letter-spacing="1.5" fill="#faf6ec">LAB TESTED</text>
  </g>

  <!-- gummies in front -->
  <g>
    <circle cx="475" cy="628" r="27" fill="#b0566c"/><circle cx="475" cy="628" r="27" fill="url(#hshine)"/>
    <circle cx="516" cy="644" r="22" fill="#8a4a72"/><circle cx="516" cy="644" r="22" fill="url(#hshine)"/>
    <circle cx="120" cy="640" r="23" fill="#5f4a86"/><circle cx="120" cy="640" r="23" fill="url(#hshine)"/>
    <path d="M770 610 Q808 580 846 610 Z" fill="#5c8c52"/>
  </g>

  <!-- front leaf -->
  <path d="M792 470 C 758 492 755 534 798 546 C 838 532 830 490 792 470 Z" fill="#1e5c45"/>
  <path d="M794 476 L794 540" stroke="#f2ecdd" stroke-width="3.5" stroke-linecap="round"/>
</svg>

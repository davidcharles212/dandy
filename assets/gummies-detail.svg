      <stop offset="0" stop-color="#f4efe4"/>
      <stop offset="1" stop-color="#e7dfcc"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.35" cy="0.28" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <circle cx="480" cy="120" r="130" fill="#e3dcc7" opacity="0.55"/>

  <ellipse cx="300" cy="470" rx="230" ry="34" fill="#3a3325" opacity="0.14"/>

  <!-- pile of gummies -->
  <g>
    <circle cx="215" cy="420" r="56" fill="#8a4a72"/><circle cx="215" cy="420" r="56" fill="url(#shine)"/>
    <circle cx="322" cy="438" r="62" fill="#b0566c"/><circle cx="322" cy="438" r="62" fill="url(#shine)"/>
    <circle cx="424" cy="418" r="52" fill="#5f4a86"/><circle cx="424" cy="418" r="52" fill="url(#shine)"/>
    <circle cx="266" cy="342" r="54" fill="#5f4a86"/><circle cx="266" cy="342" r="54" fill="url(#shine)"/>
    <circle cx="378" cy="336" r="56" fill="#8a4a72"/><circle cx="378" cy="336" r="56" fill="url(#shine)"/>
    <circle cx="322" cy="252" r="58" fill="#b0566c"/><circle cx="322" cy="252" r="58" fill="url(#shine)"/>
    <!-- sugar sparkle -->
    <g fill="#ffffff" opacity="0.75">
      <circle cx="300" cy="238" r="2.4"/><circle cx="345" cy="270" r="2"/><circle cx="250" cy="330" r="2.2"/><circle cx="398" cy="318" r="2"/><circle cx="205" cy="405" r="2.2"/><circle cx="340" cy="420" r="2.4"/><circle cx="430" cy="402" r="2"/><circle cx="288" cy="368" r="1.8"/>

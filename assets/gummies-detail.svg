  <!-- leaf accent -->
  <path d="M118 176 C 92 194 90 226 122 236 C 152 224 146 190 118 176 Z" fill="#1e5c45" opacity="0.9"/>
  <path d="M120 182 L120 230" stroke="#f4efe4" stroke-width="3" stroke-linecap="round"/>

  <text x="300" y="556" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="15" letter-spacing="2.5" fill="#7a7360">35MG MITRAGYNINE PER GUMMY · PECTIN BASE</text>
